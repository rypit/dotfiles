# Aider Configuration for Local LLM
# See: https://aider.chat/docs/config.html

# Use the openai/ prefix to trigger OpenAI-compatible API logic
model: openai/default_model

# Local mlx-lm server endpoint
openai-api-base: http://localhost:8080/v1

# Dummy key to satisfy Aider's requirement for the openai/ provider
openai-api-key: sk-local-llm

# Use the architect edit format for better results with Qwen 2.5 Coder
edit-format: whole

# Explicitly set context window to match mlx-lm (32k total)
# Split into input/output to avoid truncation
map-tokens: 8192
max-chat-history-tokens: 8192
max-input-tokens: 16384
max-output-tokens: 16384

# Model specific settings
show-model-warnings: false

# UI & Styling
dark-mode: true
code-theme: monokai
